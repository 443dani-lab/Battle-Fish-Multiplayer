<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Battle Fish — Arena</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; padding:0; height:100%; background:#02101e; overflow:hidden; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#e8f6ff; touch-action:none; }
    #hud { position:fixed; top:10px; left:50%; transform:translateX(-50%); font-weight:800; letter-spacing:1px; background:rgba(2,16,30,.7); border:1px solid rgba(127,234,255,.3); padding:6px 12px; border-radius:8px; font-size:13px; z-index:5; text-align:center; }
    #leaderboard { position:fixed; top:10px; right:10px; background:rgba(2,16,30,.75); border:1px solid rgba(127,234,255,.3); padding:8px 12px; border-radius:8px; font:600 12px/1.5 system-ui; min-width:180px; z-index:5; }
    #feed { position:fixed; bottom:12px; right:12px; background:rgba(2,16,30,.7); border:1px solid rgba(127,234,255,.25); padding:6px 10px; border-radius:8px; font:600 11px/1.6 system-ui; min-width:180px; max-width:280px; text-align:right; z-index:5; }
    #toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(2,16,30,.9); border:1px solid rgba(255,120,120,.55); padding:14px 22px; border-radius:12px; font:800 15px/1.4 system-ui; text-align:center; box-shadow:0 0 26px rgba(255,120,120,.25); display:none; z-index:6; }
    /* Button cluster — main-game grammar: big special weapon button, smaller
       tool slots arced beside it, bottom-right. Primary has NO button. */
    .abtn { position:fixed; border-radius:50%; color:#fffbe6; font:900 24px/1 system-ui; cursor:pointer; z-index:7; user-select:none; -webkit-user-select:none; touch-action:none; }
    .abtn:active { transform:scale(.94); }
    .abtn.dis { opacity:.4; }
    .abtn .cd { display:block; font:800 11px/1 system-ui; margin-top:3px; letter-spacing:1px; min-height:11px; }
    #spbtn { right:20px; bottom:78px; width:86px; height:86px; font-size:28px; border:2px solid rgba(255,190,120,.75); background:radial-gradient(circle at 35% 30%, #f4a960, #7a3d15); box-shadow:0 0 22px rgba(255,150,60,.35); }
    #gbtn  { right:118px; bottom:52px; width:60px; height:60px; font-size:22px; border:2px solid rgba(150,220,255,.6); background:radial-gradient(circle at 35% 30%, #4a7ba6, #163049); box-shadow:0 0 14px rgba(127,200,255,.25); }
    #tbtn  { right:106px; bottom:132px; width:60px; height:60px; font-size:22px; border:2px solid rgba(160,255,150,.6); background:radial-gradient(circle at 35% 30%, #4fa66a, #123a1e); box-shadow:0 0 14px rgba(140,255,140,.22); }
    #tbtn.active { box-shadow:0 0 24px rgba(140,255,140,.85); border-color:rgba(190,255,180,.95); }
    #hint { position:fixed; bottom:20px; left:20px; font:600 11px/1.4 system-ui; color:#8fd0e8; background:rgba(2,16,30,.6); padding:6px 10px; border-radius:6px; z-index:5; opacity:.85; }
    canvas { display:block; width:100vw; height:100vh; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">connecting…</div>
  <div id="leaderboard">connecting…</div>
  <div id="feed"></div>
  <div id="toast"></div>
  <button id="spbtn" class="abtn" title="SPECIAL — tap to fire">🚀<span class="cd" id="spcd"></span></button>
  <button id="gbtn"  class="abtn" title="GRENADE — tap to drop">💣<span class="cd" id="gcd"></span></button>
  <button id="tbtn"  class="abtn" title="POISON TRAIL — tap to lay">☠️<span class="cd" id="tcd"></span></button>
  <div id="hint">move: mouse / drag · auto-locks &amp; fires · 🚀 special (Space) · 💣 grenade (G) · ☠️ trail (T)</div>

  <!-- Colyseus SDK — same-origin bundled, unpkg fallback -->
  <script src="/lib/colyseus.js"></script>
  <script>
  (function(){
    'use strict';

    var WORLD = 1600;
    var canvas = document.getElementById('c');
    var ctx    = canvas.getContext('2d');
    var hud    = document.getElementById('hud');
    var lbEl   = document.getElementById('leaderboard');
    var feedEl = document.getElementById('feed');
    var toastEl= document.getElementById('toast');
    var spBtn  = document.getElementById('spbtn');
    var gBtn   = document.getElementById('gbtn');
    var tBtn   = document.getElementById('tbtn');
    var spCdEl = document.getElementById('spcd');
    var gCdEl  = document.getElementById('gcd');
    var tCdEl  = document.getElementById('tcd');
    var feedLines = [];
    var toastTimer = null;
    var booms = [];                             // {x, y, r, t0} — detonation rings

    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    var params = new URLSearchParams(location.search);
    var myName = (params.get('name') || 'You').slice(0, 16);

    // ---------- auth token relay: parent → arena → server ----------
    var pendingToken = null;
    window.addEventListener('message', function(ev){
      var d = ev.data;
      if (d && d.type === 'bf-auth' && typeof d.token === 'string'){
        pendingToken = d.token;
        if (room) { try { room.send('auth', { token: pendingToken }); } catch (err) {} }
      }
    });

    // ---------- movement input ----------
    var target = { x: WORLD/2, y: WORLD/2 };

    function screenToWorld(cx, cy){
      var mp = myServerFish();
      if (!mp) return { x: WORLD/2, y: WORLD/2 };
      return { x: mp.x + (cx - canvas.width/2), y: mp.y + (cy - canvas.height/2) };
    }
    function setTargetFromScreen(cx, cy){
      var w = screenToWorld(cx, cy);
      target.x = w.x; target.y = w.y;
    }
    canvas.addEventListener('mousemove', function(e){ setTargetFromScreen(e.clientX, e.clientY); });
    canvas.addEventListener('click',     function(e){ setTargetFromScreen(e.clientX, e.clientY); });   // click = move (never fires)
    canvas.addEventListener('touchmove', function(e){
      if (!e.touches[0]) return;
      setTargetFromScreen(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    canvas.addEventListener('touchstart', function(e){
      if (!e.touches[0]) return;
      setTargetFromScreen(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // ---------- tools: the tap-fired trio ----------
    function sendIfReady(msg, cdField){
      if (!room) return;
      var mp = myServerFish();
      if (!mp || mp.hp <= 0 || mp[cdField] > 0) return;   // server enforces too
      try { room.send(msg); } catch (err) {}
    }
    function bindTap(el, fn){
      el.addEventListener('pointerdown', function(e){ e.preventDefault(); fn(); });
      el.addEventListener('click', function(e){ e.preventDefault(); fn(); });
    }
    bindTap(spBtn, function(){ sendIfReady('special', 'specialCd'); });
    bindTap(gBtn,  function(){ sendIfReady('grenade', 'grenadeCd'); });
    bindTap(tBtn,  function(){ sendIfReady('trail',   'trailCd');   });
    window.addEventListener('keydown', function(e){
      if (e.code === 'Space'){ e.preventDefault(); sendIfReady('special', 'specialCd'); }
      if (e.code === 'KeyG'){ sendIfReady('grenade', 'grenadeCd'); }
      if (e.code === 'KeyT'){ sendIfReady('trail', 'trailCd'); }
    });

    // ---------- Colyseus connect ----------
    var CS = window.Colyseus;
    if (!CS){
      var sc = document.createElement('script');
      sc.src = 'https://unpkg.com/colyseus.js@0.16.22/dist/colyseus.js';
      sc.onload = start;
      sc.onerror = function(){ hud.textContent = 'SDK failed to load'; };
      document.head.appendChild(sc);
    } else start();

    var room = null;

    function start(){
      if (!window.Colyseus){ hud.textContent = 'SDK failed to load'; return; }
      var client = new window.Colyseus.Client('wss://play.battlefishroyale.com');
      (async function(){
        try {
          room = await client.joinOrCreate('battle', { name: myName });
          if (pendingToken){ try { room.send('auth', { token: pendingToken }); } catch (e) {} }
          hud.textContent = 'auto-locks the nearest enemy · 🚀 💣 ☠️ = your tools';
          room.onMessage('eat', function(m){
            feedLines.unshift(m.eaterName + ' killed ' + m.victimName);
            if (feedLines.length > 4) feedLines.pop();
            feedEl.innerHTML = feedLines.join('<br>');
            if (room && m.victim === room.sessionId){
              showToast('Killed by ' + m.eaterName + '!<br><span style="font-size:12px;font-weight:600;color:#f6bcbc">respawning…</span>');
            }
            if (window.parent !== window && room){
              try {
                if (m.eater  === room.sessionId) window.parent.postMessage({ type:'bf-arena', stat:'kill'  }, 'https://battlefishroyale.com');
                if (m.victim === room.sessionId) window.parent.postMessage({ type:'bf-arena', stat:'death' }, 'https://battlefishroyale.com');
              } catch (e) {}
            }
          });
          room.onMessage('boom', function(m){
            booms.push({ x: m.x, y: m.y, r: m.r || 150, t0: performance.now() });
          });
          requestAnimationFrame(draw);
        } catch (e) {
          hud.textContent = 'connection failed: ' + (e && e.message);
        }
      })();
    }

    function showToast(html){
      toastEl.innerHTML = html;
      toastEl.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ toastEl.style.display = 'none'; }, 2200);
    }

    function myServerFish(){
      return (room && room.state && room.state.players) ? room.state.players.get(room.sessionId) : null;
    }

    // ---------- movement send loop (30 Hz) ----------
    setInterval(function(){
      if (!room) return;
      var mp = myServerFish();
      if (!mp || mp.hp <= 0) return;
      var dx = target.x - mp.x, dy = target.y - mp.y;
      var d  = Math.sqrt(dx*dx + dy*dy) || 1;
      var speed = 220;
      var step  = Math.min(speed * (1/30), d);
      var nx    = mp.x + dx/d * step;
      var ny    = mp.y + dy/d * step;
      var ang   = Math.atan2(dy, dx);
      mp.x = Math.max(0, Math.min(WORLD, nx));
      mp.y = Math.max(0, Math.min(WORLD, ny));
      try { room.send('move', { x: mp.x, y: mp.y, ang: ang }); } catch (e) {}
    }, 1000/30);

    // ---------- rendering ----------
    function draw(){
      requestAnimationFrame(draw);
      var now = performance.now();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!room || !room.state) return;
      var mp = myServerFish();
      var camX = mp ? mp.x : WORLD/2;
      var camY = mp ? mp.y : WORLD/2;
      var offX = canvas.width/2 - camX;
      var offY = canvas.height/2 - camY;

      // subtle grid
      ctx.strokeStyle = 'rgba(90,180,220,.08)';
      ctx.lineWidth = 1;
      var GRID = 100;
      var x0 = Math.floor((camX - canvas.width/2) / GRID) * GRID;
      var x1 = Math.ceil ((camX + canvas.width/2) / GRID) * GRID;
      var y0 = Math.floor((camY - canvas.height/2) / GRID) * GRID;
      var y1 = Math.ceil ((camY + canvas.height/2) / GRID) * GRID;
      ctx.beginPath();
      for (var gx = x0; gx <= x1; gx += GRID){ ctx.moveTo(gx + offX, y0 + offY); ctx.lineTo(gx + offX, y1 + offY); }
      for (var gy = y0; gy <= y1; gy += GRID){ ctx.moveTo(x0 + offX, gy + offY); ctx.lineTo(x1 + offX, gy + offY); }
      ctx.stroke();

      // world boundary
      ctx.strokeStyle = 'rgba(127,234,255,.35)';
      ctx.lineWidth = 2;
      ctx.strokeRect(offX, offY, WORLD, WORLD);

      // ☠️ poison trail segments (under everything else)
      if (room.state.trails){
        room.state.trails.forEach(function(t){
          var sx = t.x + offX, sy = t.y + offY;
          if (sx < -40 || sx > canvas.width + 40 || sy < -40 || sy > canvas.height + 40) return;
          var a = Math.max(0, Math.min(1, t.ttl / 7)) * 0.45;
          ctx.fillStyle = 'rgba(110,235,110,' + a.toFixed(3) + ')';
          ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(60,160,60,' + (a * 0.7).toFixed(3) + ')';
          ctx.beginPath(); ctx.arc(sx, sy, 9, 0, Math.PI*2); ctx.fill();
        });
      }

      // 💣 grenades — dark sphere, blinking fuse light that speeds up
      if (room.state.grenades){
        room.state.grenades.forEach(function(g){
          var sx = g.x + offX, sy = g.y + offY;
          if (sx < -40 || sx > canvas.width + 40 || sy < -40 || sy > canvas.height + 40) return;
          ctx.fillStyle = '#20303f';
          ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = 'rgba(150,200,240,.6)';
          ctx.lineWidth = 2;
          ctx.stroke();
          var blinkRate = 4 + (1.1 - Math.max(0, g.fuse)) * 14;   // blinks faster near zero
          if (Math.sin(now * 0.02 * blinkRate) > 0){
            ctx.fillStyle = '#ff5a5a';
            ctx.beginPath(); ctx.arc(sx + 4, sy - 5, 3, 0, Math.PI*2); ctx.fill();
          }
        });
      }

      // boom rings (0.45s expand + fade)
      for (var bi = booms.length - 1; bi >= 0; bi--){
        var bm = booms[bi];
        var age = (now - bm.t0) / 450;
        if (age >= 1){ booms.splice(bi, 1); continue; }
        var bx = bm.x + offX, by = bm.y + offY;
        ctx.strokeStyle = 'rgba(255,170,80,' + (1 - age).toFixed(3) + ')';
        ctx.lineWidth = 6 * (1 - age) + 1;
        ctx.beginPath(); ctx.arc(bx, by, bm.r * (0.3 + 0.7 * age), 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,235,180,' + ((1 - age) * 0.6).toFixed(3) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(bx, by, bm.r * (0.15 + 0.55 * age), 0, Math.PI*2); ctx.stroke();
      }

      // LOCK reticle
      if (mp && mp.hp > 0 && mp.lockId && room.state.players){
        var lockP = room.state.players.get(mp.lockId);
        if (lockP && lockP.hp > 0){
          var lsx = lockP.x + offX, lsy = lockP.y + offY;
          var msx = mp.x + offX,   msy = mp.y + offY;
          var pulse = 1 + 0.12 * Math.sin(now * 0.008);
          ctx.strokeStyle = 'rgba(255,120,120,.35)';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 6]);
          ctx.beginPath(); ctx.moveTo(msx, msy); ctx.lineTo(lsx, lsy); ctx.stroke();
          ctx.setLineDash([]);
          ctx.strokeStyle = 'rgba(255,120,120,.85)';
          ctx.lineWidth = 2.5;
          var rr = (lockP.size + 10) * pulse;
          ctx.beginPath(); ctx.arc(lsx, lsy, rr, 0, Math.PI*2); ctx.stroke();
          ctx.beginPath();
          [[1,0],[0,1],[-1,0],[0,-1]].forEach(function(v){
            ctx.moveTo(lsx + v[0]*rr, lsy + v[1]*rr);
            ctx.lineTo(lsx + v[0]*(rr+7), lsy + v[1]*(rr+7));
          });
          ctx.stroke();
        }
      }

      // projectiles
      if (room.state.projectiles){
        room.state.projectiles.forEach(function(pr){
          var sx = pr.x + offX, sy = pr.y + offY;
          if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) return;
          var isSp = pr.kind === 's';
          var trailT = isSp ? 0.07 : 0.04;
          var tx = sx - pr.vx * trailT, ty = sy - pr.vy * trailT;
          var grad = ctx.createLinearGradient(tx, ty, sx, sy);
          if (isSp){
            grad.addColorStop(0, 'rgba(255,150,60,0)');
            grad.addColorStop(1, 'rgba(255,150,60,.95)');
          } else {
            grad.addColorStop(0, 'rgba(255,220,140,0)');
            grad.addColorStop(1, 'rgba(255,220,140,.9)');
          }
          ctx.strokeStyle = grad;
          ctx.lineWidth = isSp ? 7 : 4;
          ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx, sy); ctx.stroke();
          ctx.fillStyle = isSp ? '#ffd9a8' : '#fff2c8';
          ctx.beginPath(); ctx.arc(sx, sy, isSp ? 6.5 : 3.5, 0, Math.PI*2); ctx.fill();
          if (isSp){
            ctx.strokeStyle = 'rgba(255,170,80,.5)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI*2); ctx.stroke();
          }
        });
      }

      // players
      var ranked = [];
      room.state.players.forEach(function(p, id){
        ranked.push([id, p]);
        var sx = p.x + offX, sy = p.y + offY;
        if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;
        var isMe = (room && id === room.sessionId);
        drawFish(ctx, sx, sy, p.size, p.ang || 0, p.color, isMe, p.hp <= 0, now);
        ctx.fillStyle = p.hp <= 0 ? 'rgba(255,120,120,.6)' : '#fff';
        ctx.font = '600 12px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(p.name || 'Fish', sx, sy - p.size - 14);
        if (p.hp > 0){
          var bw = 44, bh = 5;
          var bx2 = sx - bw/2, by2 = sy - p.size - 10;
          ctx.fillStyle = 'rgba(0,0,0,.55)';
          ctx.fillRect(bx2 - 1, by2 - 1, bw + 2, bh + 2);
          var frac = Math.max(0, Math.min(1, p.hp / (p.maxHp || 100)));
          ctx.fillStyle = frac > 0.5 ? '#7cf59a' : (frac > 0.25 ? '#ffcc66' : '#ff7676');
          ctx.fillRect(bx2, by2, bw * frac, bh);
        }
        if (p.hp <= 0){
          ctx.fillStyle = 'rgba(255,120,120,.8)';
          ctx.font = '700 10px system-ui';
          ctx.fillText('respawning ' + p.respawnT.toFixed(1) + 's', sx, sy + p.size + 16);
        }
      });

      // minimap
      var mm = 130, mmX = 12, mmY = canvas.height - mm - 12;
      ctx.fillStyle = 'rgba(2,16,30,.65)';
      ctx.strokeStyle = 'rgba(127,234,255,.3)';
      ctx.fillRect(mmX, mmY, mm, mm);
      ctx.strokeRect(mmX, mmY, mm, mm);
      var sc2 = mm / WORLD;
      room.state.players.forEach(function(p, id){
        if (p.hp <= 0) return;
        ctx.fillStyle = (id === room.sessionId) ? '#7feaff' : '#8fd0e8';
        ctx.beginPath();
        ctx.arc(mmX + p.x*sc2, mmY + p.y*sc2, id === room.sessionId ? 3.5 : 2.2, 0, Math.PI*2);
        ctx.fill();
        if (id === room.sessionId){ ctx.lineWidth = 1.2; ctx.strokeStyle = '#fff'; ctx.stroke(); }
      });

      // leaderboard (ranked by K then D)
      ranked.sort(function(a, b){ return (b[1].kills - a[1].kills) || (a[1].deaths - b[1].deaths); });
      var lbHtml = '<b>LEADERBOARD</b> <span style="opacity:.55;font-size:10px">K / D</span><br>';
      ranked.slice(0, 5).forEach(function(pr){
        var p = pr[1];
        var mark = (room && pr[0] === room.sessionId) ? ' ▶' : '';
        lbHtml += p.name + mark + ' — ' + (p.kills || 0) + ' / ' + (p.deaths || 0) + '<br>';
      });
      var meP = myServerFish();
      if (meP){
        var kd = meP.deaths ? (meP.kills / meP.deaths).toFixed(1) : String(meP.kills || 0);
        lbHtml += '<br><span style="color:#aef3ff;font-weight:700">' +
                  '⚔ ' + (meP.kills || 0) + ' kills · ' + (meP.deaths || 0) + ' deaths · K/D ' + kd + '</span>' +
                  '<br><span style="color:' + (meP.hp > 50 ? '#7cf59a' : meP.hp > 25 ? '#ffcc66' : '#ff7676') + ';font-weight:700">' +
                  '♥ HP ' + Math.round(meP.hp) + ' / ' + (meP.maxHp || 100) + '</span>';
      }
      lbEl.innerHTML = lbHtml;

      // tool buttons — server-synced cooldowns, exactly like the game's slots
      var alive = meP && meP.hp > 0;
      spBtn.classList.toggle('dis', !(alive && meP.specialCd <= 0));
      gBtn.classList.toggle('dis',  !(alive && meP.grenadeCd <= 0));
      tBtn.classList.toggle('dis',  !(alive && meP.trailCd <= 0));
      tBtn.classList.toggle('active', !!(alive && meP.trailT > 0));
      spCdEl.textContent = (meP && meP.specialCd > 0) ? meP.specialCd.toFixed(1) : '';
      gCdEl.textContent  = (meP && meP.grenadeCd > 0) ? meP.grenadeCd.toFixed(1) : '';
      tCdEl.textContent  = (meP && meP.trailT > 0) ? 'ON' : ((meP && meP.trailCd > 0) ? meP.trailCd.toFixed(1) : '');
    }

    function drawFish(ctx, sx, sy, size, ang, color, isMe, dead, now){
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(ang);
      ctx.globalAlpha = dead ? 0.35 : 1;
      ctx.fillStyle = color || '#7feaff';
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.62, 0, 0, Math.PI*2);
      ctx.fill();
      var wag = Math.sin(now * 0.012) * size * 0.18;
      ctx.beginPath();
      ctx.moveTo(-size * 0.85, 0);
      ctx.lineTo(-size * 1.35, -size * 0.55 + wag);
      ctx.lineTo(-size * 1.35,  size * 0.55 + wag);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(size * 0.45, -size * 0.18, size * 0.14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(size * 0.5, -size * 0.18, size * 0.07, 0, Math.PI*2); ctx.fill();
      if (isMe && !dead){
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.2;
        ctx.beginPath(); ctx.ellipse(0, 0, size + 2, size * 0.62 + 2, 0, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  })();
  </script>
</body>
</html>
