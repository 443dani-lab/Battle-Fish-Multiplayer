<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battle Fish — Arena</title>
<style>
  html,body{margin:0;height:100%;background:#02101e;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
  #hud{position:fixed;top:8px;left:8px;color:#7feaff;font-size:13px;background:rgba(0,0,0,.42);padding:5px 10px;border-radius:8px;pointer-events:none}
  #board{position:fixed;top:8px;right:8px;color:#cfe9ff;font-size:12px;line-height:1.5;background:rgba(0,0,0,.42);padding:6px 12px;border-radius:8px;min-width:120px;pointer-events:none}
  #board b{color:#7feaff}
  canvas{display:block;background:#04203a;touch-action:none}
</style>
</head>
<body>
<div id="hud">connecting…</div>
<div id="board"></div>
<canvas id="c"></canvas>
<script src="/lib/colyseus.js"></script>
<script>
  var WORLD = 1600;
  var canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  var hud = document.getElementById('hud'), board = document.getElementById('board');
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  var SERVER_URL = "";  // empty = same host that served this page
  var endpoint = SERVER_URL || ((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
  var client = new Colyseus.Client(endpoint);
  var room = null;

  var target = { x: WORLD/2, y: WORLD/2 };
  var myPos = null;          // client-side PREDICTED position (instant response)
  var myLastSize = null;     // to detect being eaten (size reset) -> snap to respawn
  var renderFish = {};       // sessionId -> smoothed {x,y,size} for drawing

  (async function(){
    try {
      room = await client.joinOrCreate('battle', { name: 'Fish ' + Math.floor(Math.random()*1000) });
      hud.textContent = 'move your mouse — eat smaller fish';
      requestAnimationFrame(draw);
    } catch (e) { hud.textContent = 'connection failed: ' + e.message; }
  })();

  function myServerFish(){
    return (room && room.state && room.state.players) ? room.state.players.get(room.sessionId) : null;
  }

  function setTarget(cx, cy){
    var m = myPos || myServerFish();
    var camX = m ? m.x : WORLD/2, camY = m ? m.y : WORLD/2;
    target.x = cx - (canvas.width/2 - camX);
    target.y = cy - (canvas.height/2 - camY);
  }
  canvas.addEventListener('mousemove', function(e){ setTarget(e.clientX, e.clientY); });
  canvas.addEventListener('touchmove', function(e){ e.preventDefault(); var t = e.touches[0]; setTarget(t.clientX, t.clientY); }, {passive:false});

  // report our predicted position to the server 20x/sec (server clamps it and owns all eating)
  setInterval(function(){
    if (room && myPos) room.send('move', { x: myPos.x, y: myPos.y });
  }, 50);

  var last = performance.now();
  function draw(){
    requestAnimationFrame(draw);           // scheduled first: nothing can kill the loop
    var now = performance.now();
    var dt = Math.min(0.05, (now - last) / 1000); last = now;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!(room && room.state && room.state.players)) return;

    var sm = myServerFish();
    if (sm){
      if (!myPos) myPos = { x: sm.x, y: sm.y };
      // got eaten? (server reset our size) -> snap to the respawn point
      if (myLastSize !== null && sm.size < myLastSize - 4){ myPos.x = sm.x; myPos.y = sm.y; }
      myLastSize = sm.size;
      // if server and prediction ever diverge badly, trust the server
      var ex = sm.x - myPos.x, ey = sm.y - myPos.y;
      if (ex*ex + ey*ey > 250*250){ myPos.x = sm.x; myPos.y = sm.y; }

      // PREDICTION: move locally toward the cursor every frame — instant response
      var dx = target.x - myPos.x, dy = target.y - myPos.y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d > 1){
        var pps = 20 * Math.max(3, 11 - sm.size * 0.03);   // same speed as before, per second
        var step = Math.min(pps * dt, d);
        myPos.x += dx/d * step; myPos.y += dy/d * step;
      }
      myPos.x = Math.max(0, Math.min(WORLD, myPos.x));
      myPos.y = Math.max(0, Math.min(WORLD, myPos.y));
    }

    var camX = myPos ? myPos.x : WORLD/2, camY = myPos ? myPos.y : WORLD/2;
    var ox = canvas.width/2 - camX, oy = canvas.height/2 - camY;

    ctx.strokeStyle = '#0a4d68'; ctx.lineWidth = 4;
    ctx.strokeRect(ox, oy, WORLD, WORLD);

    // INTERPOLATION: glide every fish toward its latest server position (hides network steps)
    var seen = {}, list = [];
    room.state.players.forEach(function(p, id){
      seen[id] = true;
      var r = renderFish[id];
      if (!r) r = renderFish[id] = { x: p.x, y: p.y, size: p.size };
      if (id === room.sessionId && myPos){ r.x = myPos.x; r.y = myPos.y; }
      else {
        var k = Math.min(1, dt * 10);
        r.x += (p.x - r.x) * k; r.y += (p.y - r.y) * k;
      }
      r.size += (p.size - r.size) * Math.min(1, dt * 6);   // smooth growth
      list.push([id, p, r]);
    });
    for (var gone in renderFish){ if (!seen[gone]) delete renderFish[gone]; }

    list.sort(function(a, b){ return a[2].size - b[2].size; });
    list.forEach(function(t3){
      var id = t3[0], p = t3[1], r = t3[2];
      var sx = r.x + ox, sy = r.y + oy;
      ctx.beginPath(); ctx.arc(sx, sy, r.size, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
      if (id === room.sessionId){ ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke(); }
      ctx.fillStyle = '#e8f6ff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(p.name, sx, sy - r.size - 6);
    });

    var ranked = list.map(function(pr){ return pr[1]; }).sort(function(a, b){ return b.score - a.score; }).slice(0, 5);
    var html = '<b>Leaderboard</b><br>';
    ranked.forEach(function(p){ html += p.name + ': ' + p.score + '<br>'; });
    board.innerHTML = html;
    hud.textContent = list.length + ' fish in the arena — eat smaller ones';
  }
</script>
</body>
</html>
